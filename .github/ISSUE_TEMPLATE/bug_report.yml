name: バグ報告
description: 不具合を報告する
labels: [bug]
body:
  - type: markdown
    attributes:
      value: バグ報告ありがとうございます。再現に必要な情報をできるだけ記入してください。

  - type: textarea
    id: description
    attributes:
      label: 不具合の内容
      description: 何が起きているか
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1. `npm start -- --input ...` を実行
        2. ツリー提案で `y` を選択
        3. エラーが発生する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: エラーログ
      render: shell

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Windows 11 / Ubuntu 24.04

  - type: input
    id: node
    attributes:
      label: Node.js バージョン
      placeholder: v20.x
